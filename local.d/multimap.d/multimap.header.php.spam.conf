nforcer_header_php_spam {
  type = "header";
  header = "User-Agent"; # Explicitly define the header to check
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/multimap.header.php.map";
  score = 3.0;
  symbol = "nforcer_header_php_spam";
  description = "Suspicious PHP-related header patterns";
  regexp = true;         # Most PHP/User-Agent maps use regex
  one_shot = true;       # Usually, one hit is enough for a UA check
}
