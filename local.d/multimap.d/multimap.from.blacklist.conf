nforcer_from_blacklist {
  type = "from";
  filter = "email:addr"; 
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/multimap.from.blacklist.map";
  score = 10.0;
  symbol = "nforcer_from_blacklist";
  description = "Sender/domain blacklist";
  regexp = true;   # CRITICAL for your /.+.com/i entries
  one_shot = true; # Prevents double-scoring if multiple 'From' headers exist
}
