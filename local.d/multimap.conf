# Modular multimap loader.
# Rules are split into local.d/nforcer/*.conf and maps are stored in maps.d/.

.include "$CONFDIR/local.d/nforcer/multimap.whitelist.email.conf"
.include "$CONFDIR/local.d/nforcer/multimap.whitelist.domain.conf"
.include "$CONFDIR/local.d/nforcer/multimap.blacklist.email.conf"
.include "$CONFDIR/local.d/nforcer/multimap.blacklist.domain.conf"

.include "$CONFDIR/local.d/nforcer/multimap.subject.conf"

.include "$CONFDIR/local.d/nforcer/multimap.url.conf"

.include "$CONFDIR/local.d/nforcer/multimap.country.block.conf"
.include "$CONFDIR/local.d/nforcer/multimap.language.block.conf"
.include "$CONFDIR/local.d/nforcer/multimap.asn.block.conf"

.include "$CONFDIR/local.d/nforcer/multimap.body.spam.conf"
.include "$CONFDIR/local.d/nforcer/multimap.header.php.spam.conf"
