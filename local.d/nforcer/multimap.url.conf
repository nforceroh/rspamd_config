# URL and TLD-based multimap rules

nforcer_url_high {
  type = "url";
  filter = "domain";   # Matches the hostname (e.g., workers.dev)
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/url.high.map";
  score = 5.5;
  symbol = "nforcer_url_high";
  description = "Known high-spam URL domains";
  regexp = false;      # Faster literal matching
  one_shot = true;     # Trigger only once per email
}

nforcer_url_tld_high {
  type = "url";
  filter = "domain";  # Matches the full domain (e.g., "spammer.ga")
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/url.tld.high.map";
  score = 4.0;
  symbol = "nforcer_url_tld_high";
  description = "High-risk URL TLD patterns";
  regexp = true;      # REQUIRED for /regex/ support
  one_shot = true;    # Prevents massive scores from multiple links
}

nforcer_url_tld_med {
  type = "url";
  filter = "domain";   # Required for the regex anchors to work
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/url.tld.med.map";
  score = 2.0;
  symbol = "nforcer_url_tld_med";
  description = "Medium-risk URL TLD patterns";
  regexp = true;       # CRITICAL for /pattern/i support
  one_shot = true;     # Prevents score bloat from multiple links
}
nforcer_url_tld_low {
  type = "url";
  filter = "domain";   # Required for the regex anchors to work
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/url.tld.low.map";
  score = 0.8;
  symbol = "nforcer_url_tld_low";
  description = "Low-risk URL TLD patterns";
  regexp = true;       # CRITICAL for /pattern/i support
  one_shot = true;     # Prevents score bloat from multiple links  
}
